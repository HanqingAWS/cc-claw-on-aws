# cc-connect configuration
# Full reference: cc-connect config-example

attachment_send = "on"
language = "zh"

[log]
level = "info" # debug, info, warn, error

# [stream_preview]
# enabled = true
# interval_ms = 1500

# [rate_limit]
# max_messages = 20
# window_secs = 60

# =============================================================================
# Project
# =============================================================================

[[projects]]
name = "my-project"

[projects.agent]
type = "claudecode"

[projects.agent.options]
mode = "bypassPermissions" # "default" | "acceptEdits" | "plan" | "bypassPermissions"
work_dir = "/home/ec2-user/projects"
allowed_tools = ["Read", "Grep", "Glob", "Bash", "Edit", "Write", "WebFetch", "TodoRead", "TodoWrite"]

